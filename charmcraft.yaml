name: cos-configuration-k8s
type: charm
summary: Push user (3rd-party) rules to COS charms.
description: |
  COS Configuration K8s is a Juju charm that syncs observability configurations — such as
  Prometheus alert rules, Loki alert rules and Grafana dashboards — from
  a Git repository and forwards them to the corresponding COS charms. It is a complementary
  charm to the Canonical Observability Stack (COS):
  https://documentation.ubuntu.com/observability

  This charm enables an infrastructure-as-code workflow for observability, allowing operators
  to manage alert rules and dashboards in version control and have them automatically applied
  to the running stack.

  Key features:

  - Automatic synchronization of configurations from a Git repository using git-sync.
  - Forwarding of Prometheus alert and recording rules, Loki alert rules and Grafana dashboards
    to their respective COS charms via Juju relations.
  - Support for private repositories via SSH keys, including Juju secrets integration for
    secure key storage.
  - Configurable paths within the repository for each type of configuration.
  - Configurable branch, revision, and clone depth for fine-grained control over the sync.
  - On-demand sync via the sync-now action, in addition to periodic automatic updates.

links:
  documentation: https://documentation.ubuntu.com/observability/track-2/
  source: https://github.com/canonical/cos-configuration-k8s-operator
  issues: https://github.com/canonical/cos-configuration-k8s-operator/issues

assumes:
  - k8s-api
  - juju >= 3.6

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]
    override-build: |
      craftctl default
      git describe --always > $CRAFT_PART_INSTALL/version

containers:
  git-sync:
    resource: git-sync-image
    mounts:
      - storage: content-from-git
        location: /git

resources:
  git-sync-image:
    type: oci-image
    description: OCI image for git-sync
    upstream-source: k8s.gcr.io/git-sync/git-sync:v3.6.9

storage:
  content-from-git:
    type: filesystem
    description: >
      Where to store the checked-out content from the git repo.
    # Prometheus, Loki and grafana libraries expect to find the alert rules in the charm container.
    # If left unspecified, "content-from-git" would be mounted under
    # "/juju/storage/content-from-git/0" in the charm container.

provides:
  prometheus-config:
    interface: prometheus_scrape
  grafana-dashboards:
    interface: grafana_dashboard

requires:
  loki-config:
    interface: loki_push_api
  tracing:
    description: |
      Tracing endpoint for integrating with tempo.
    limit: 1
    interface: tracing
  send-remote-write:
    interface: prometheus_remote_write
    optional: true
    description: |
      Send alert rules via Prometheus remote write.

peers:
  replicas:
    interface: cos_configuration_replica

config:
  options:
    git_repo:
      type: string
      description: URL to repo to clone and sync against.
    git_branch:
      type: string
      description: The git branch to check out.
      default: master
    git_rev:
      type: string
      description: The git revision (tag or hash) to check out
      default: HEAD
    git_depth:
      type: int
      description: >
        Cloning depth, to truncate commit history to the specified number of commits.
        Zero means no truncating.
      default: 1
    git_ssh_key:
      type: string
      description: >
        An optional SSH private key to use when cloning the repository.

        WARNING: This will expose your private key as cleartext in the Juju config. Use the
                 "git_ssh_key_secret" config option instead.
    git_ssh_key_secret:
      type: string
      description: >
        An optional SSH private key to use when cloning the repository.

        This option takes priority over "git_ssh_key" if both are set.

        The value must be a Juju secret ID, which references a Juju secret, containing the private
        SSH key. The format for the input is:
          - secret://<secret-id>/<key>

        This requires the admin to create a Juju secret. The secret must:
          - exist in the same model as the cos-configuration charm
          - have a key named <key> with the value of the private SSH key

        Make sure to "grant-secret" this secret to the cos-configuration charm.
    prometheus_alert_rules_path:
      type: string
      description: Relative path in repo to prometheus rules.
      default: "prometheus_alert_rules"
    loki_alert_rules_path:
      type: string
      description: Relative path in repo to loki rules.
      default: "loki_alert_rules"
    grafana_dashboards_path:
      type: string
      description: Relative path in repo to grafana dashboards.
      default: "grafana_dashboards"

actions:
  sync-now:
    description: |
      Sync relation data with files from the repo. This action can be used to force an update instead of
      waiting for the update-status hook to fire.
